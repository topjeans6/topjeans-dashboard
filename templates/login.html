<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>เข้าสู่ระบบ — Top Jeans</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"IBM Plex Sans Thai",sans-serif;background:#f7f7f5;min-height:100vh;display:flex;align-items:center;justify-content:center}
.wrap{width:100%;max-width:380px;padding:20px}
.card{background:#fff;border:1px solid #e5e5e2;border-radius:16px;padding:36px 32px}
.logo{text-align:center;margin-bottom:28px}
.icon{width:52px;height:52px;background:#eff6ff;border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
.icon svg{width:26px;height:26px;color:#2563eb}
h1{font-size:18px;font-weight:600;text-align:center}
.sub{font-size:12px;color:#9b9b9b;text-align:center;margin-top:4px}
.fg{margin-bottom:16px}
label{display:block;font-size:12px;font-weight:600;color:#6b6b6b;margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
input{width:100%;padding:10px 13px;border:1px solid #d0d0cc;border-radius:8px;font-size:14px;font-family:inherit}
input:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.btn{width:100%;padding:11px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:8px}
.btn:hover{background:#1d4ed8}
.err{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;background:#fef2f2;border:1px solid #fecaca;color:#dc2626}
.hint{margin-top:20px;padding:12px;background:#f7f7f5;border-radius:8px;font-size:12px;color:#9b9b9b;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="logo">
      <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7H4a2 2 0 00-2 2v10a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/></svg></div>
      <h1>Top Jeans</h1><div class="sub">Business Dashboard</div>
    </div>
    {% with m=get_flashed_messages() %}{% if m %}<div class="err">{{ m[0] }}</div>{% endif %}{% endwith %}
    <form method="POST">
      <div class="fg"><label>ชื่อผู้ใช้</label><input name="username" placeholder="username" required></div>
      <div class="fg"><label>รหัสผ่าน</label><input type="password" name="password" placeholder="••••••••" required></div>
      <button type="submit" class="btn">เข้าสู่ระบบ</button>
    </form>
    <div class="hint">default: <strong style="color:#6b6b6b">admin</strong> / <strong style="color:#6b6b6b">topjeans2024</strong></div>
  </div>
</div>
</body></html>
