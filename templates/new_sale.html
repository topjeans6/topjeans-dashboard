{% extends "base.html" %}
{% block title %}บันทึกการขาย – Top Jeans{% endblock %}
{% block ptitle %}บันทึกการขาย{% endblock %}
{% block content %}
<form method="POST" enctype="multipart/form-data">

  <div class="card" style="margin-bottom:16px">
    <div class="ch"><span class="ct">ข้อมูลลูกค้า</span></div>
    <div class="cb">
      <div class="fgrid">
        <div class="fg">
          <label class="fl">วันที่สั่งซื้อ *</label>
          <input class="fc" type="text" name="order_date" placeholder="01/01/2026" pattern="[\d/\-]+" required>
        </div>
        <div class="fg">
          <label class="fl">Username ลูกค้า *</label>
          <input class="fc" type="text" name="username" required>
        </div>
        <div class="fg">
          <label class="fl">Platform (ช่องทางออนไลน์) *</label>
          <select class="fc" name="platform" required>
            <option value="">-- เลือก Platform --</option>
            <option>Facebook</option>
            <option>Line</option>
            <option>IG</option>
            <option>Tiktok</option>
            <option>X</option>
            <option>Threads</option>
            <option>Shopee</option>
            <option>LAZADA</option>
          </select>
        </div>
        <div class="fg">
          <label class="fl">ชื่อ-สกุล *</label>
          <input class="fc" type="text" name="customer" required>
        </div>
        <div class="fg">
          <label class="fl">เบอร์โทร *</label>
          <input class="fc" type="tel" name="phone" pattern="[0-9]+" required>
        </div>
      </div>
      <div class="fg">
        <label class="fl">ที่อยู่ *</label>
        <input class="fc" type="text" name="address" required>
      </div>
      <div class="fg">
        <label class="fl">จังหวัด *</label>
        <select class="fc" name="province" required>
          <option value="">-- เลือกจังหวัด --</option>
          <option>กรุงเทพมหานคร</option><option>กระบี่</option><option>กาญจนบุรี</option>
          <option>กาฬสินธุ์</option><option>กำแพงเพชร</option><option>ขอนแก่น</option>
          <option>จันทบุรี</option><option>ฉะเชิงเทรา</option><option>ชลบุรี</option>
          <option>ชัยนาท</option><option>ชัยภูมิ</option><option>ชุมพร</option>
          <option>เชียงราย</option><option>เชียงใหม่</option><option>ตรัง</option>
          <option>ตราด</option><option>ตาก</option><option>นครนายก</option>
          <option>นครปฐม</option><option>นครพนม</option><option>นครราชสีมา</option>
          <option>นครศรีธรรมราช</option><option>นครสวรรค์</option><option>นนทบุรี</option>
          <option>นราธิวาส</option><option>น่าน</option><option>บึงกาฬ</option>
          <option>บุรีรัมย์</option><option>ปทุมธานี</option><option>ประจวบคีรีขันธ์</option>
          <option>ปราจีนบุรี</option><option>ปัตตานี</option><option>พระนครศรีอยุธยา</option>
          <option>พะเยา</option><option>พังงา</option><option>พัทลุง</option>
          <option>พิจิตร</option><option>พิษณุโลก</option><option>เพชรบุรี</option>
          <option>เพชรบูรณ์</option><option>แพร่</option><option>ภูเก็ต</option>
          <option>มหาสารคาม</option><option>มุกดาหาร</option><option>แม่ฮ่องสอน</option>
          <option>ยโสธร</option><option>ยะลา</option><option>ร้อยเอ็ด</option>
          <option>ระนอง</option><option>ระยอง</option><option>ราชบุรี</option>
          <option>ลพบุรี</option><option>ลำปาง</option><option>ลำพูน</option>
          <option>เลย</option><option>ศรีสะเกษ</option><option>สกลนคร</option>
          <option>สงขลา</option><option>สตูล</option><option>สมุทรปราการ</option>
          <option>สมุทรสงคราม</option><option>สมุทรสาคร</option><option>สระแก้ว</option>
          <option>สระบุรี</option><option>สิงห์บุรี</option><option>สุโขทัย</option>
          <option>สุพรรณบุรี</option><option>สุราษฎร์ธานี</option><option>สุรินทร์</option>
          <option>หนองคาย</option><option>หนองบัวลำภู</option><option>อ่างทอง</option>
          <option>อำนาจเจริญ</option><option>อุดรธานี</option><option>อุตรดิตถ์</option>
          <option>อุทัยธานี</option><option>อุบลราชธานี</option>
        </select>
      </div>
      <div class="fg">
        <label class="fl">รหัสไปรษณีย์ *</label>
        <input class="fc" type="text" name="postcode" pattern="[0-9]{5}" maxlength="5" required>
      </div>
    </div>
  </div>

  <div class="card" style="margin-bottom:16px">
    <div class="ch"><span class="ct">ข้อมูลสินค้า</span></div>
    <div class="cb">
      <div class="fgrid">
        <div class="fg">
          <label class="fl">SKU * (10 ตัวอักษร)</label>
          <input class="fc" type="text" name="sku" maxlength="10" minlength="10" required>
        </div>
        <div class="fg">
          <label class="fl">Link (ช่องทางขาย)</label>
          <input class="fc" type="url" name="link" placeholder="https://...">
        </div>
        <div class="fg">
          <label class="fl">จำนวน/ชิ้น *</label>
          <input class="fc" type="number" name="quantity" min="1" value="1" required>
        </div>
        <div class="fg">
          <label class="fl">ราคาปกติ *</label>
          <input class="fc" type="number" name="price_normal" min="0" required>
        </div>
        <div class="fg">
          <label class="fl">ราคาลด *</label>
          <input class="fc" type="number" name="price_discount" min="0" required>
        </div>
        <div class="fg">
          <label class="fl">ยอดโอนเต็ม *</label>
          <input class="fc" type="number" name="price_transfer" min="0" required>
        </div>
        <div class="fg">
          <label class="fl">วันที่ชำระ *</label>
          <input class="fc" type="text" name="payment_date" placeholder="01/01/2026" pattern="[\d/\-]+" required>
        </div>
      </div>
      <div class="fg">
        <label class="fl">ช่องทางที่ขายได้</label>
        <select class="fc" name="sale_channel">
          <option value="">-- เลือกช่องทาง --</option>
          <option>Marketplace - Bell</option>
          <option>Marketplace - TopjeansVTG</option>
          <option>Page-Facebook</option>
          <option>Reel - Facebook</option>
          <option>IG</option>
          <option>Tiktok</option>
          <option>Shopee</option>
          <option>Line OA</option>
          <option>Line Shopping</option>
        </select>
      </div>
    </div>
  </div>

  <div class="card" style="margin-bottom:16px">
    <div class="ch"><span class="ct">ข้อมูลการชำระเงิน</span></div>
    <div class="cb">
      <div class="fgrid">
        <div class="fg">
          <label class="fl">รูปแบบชำระ *</label>
          <select class="fc" name="payment_method" id="payment_method" onchange="toggleCOD()">
            <option value="โอนชำระ">โอนชำระ</option>
            <option value="COD">COD</option>
          </select>
        </div>
        <div class="fg">
          <label class="fl">แนบสลิป (หลักฐานการโอน) *</label>
          <input class="fc" type="file" name="slip" accept="image/*" required>
        </div>
      </div>
      <div id="cod_fields" style="display:none">
        <div class="fgrid">
          <div class="fg">
            <label class="fl">รับค่าบริการ COD</label>
            <input class="fc" type="number" name="cod_fee" min="0" value="0">
          </div>
          <div class="fg">
            <label class="fl">มัดจำ</label>
            <input class="fc" type="number" name="cod_deposit" min="0" value="0">
          </div>
          <div class="fg">
            <label class="fl">วันที่รับเงิน COD</label>
            <input class="fc" type="text" name="cod_date" placeholder="01/01/2026" pattern="[\d/\-]+">
          </div>
          <div class="fg">
            <label class="fl">จำนวนเงิน COD</label>
            <input class="fc" type="number" name="cod_amount" min="0" value="0">
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="card" style="margin-bottom:16px">
    <div class="ch"><span class="ct">รูปภาพและสถานะ</span></div>
    <div class="cb">
      <div class="fgrid">
        <div class="fg">
          <label class="fl">ภาพสินค้า *</label>
          <input class="fc" type="file" name="product_image" accept="image/*" required>
        </div>
        <div class="fg">
          <label class="fl">สถานะการส่ง</label>
          <select class="fc" name="shipping_status">
            <option value="เตรียมส่ง">เตรียมส่ง</option>
          </select>
        </div>
      </div>
      <div class="fg">
        <label class="fl">หมายเหตุ</label>
        <textarea class="fc" name="notes" rows="3" placeholder="หมายเหตุเพิ่มเติม..."></textarea>
      </div>
    </div>
  </div>

  <div style="display:flex;gap:10px">
    <button type="submit" class="btn btn-ok" style="flex:1;padding:12px;font-size:15px">💾 บันทึกการขาย + ตัดสต๊อก</button>
    <a href="{{ url_for('sales') }}" class="btn btn-s">ยกเลิก</a>
  </div>

</form>
{% endblock %}

{% block scripts %}
<script>
function toggleCOD() {
  const method = document.getElementById('payment_method').value;
  document.getElementById('cod_fields').style.display = method === 'COD' ? 'block' : 'none';
}
</script>
{% endblock %}
